body:
  text: 千巖禪師語録序往豫家居時嘗謁千巖禪師於烏傷伏龍山當是時遐邇學子望風奔湊曾未幾何化荒墟為樓觀易寥空為金碧鐘鼓之聲上徹霄漢嗚呼何其能也蓋禪師之不能為能不用為用芳蘭生於深谷而馨香遠聞蒼璧韞于玄璞而光輝外發禪師處於遐壤而人競從之有道之士其果有異於庸常者歟且禪師在時其弟子嗣詔嘗録其語鍥梓以傳豫嘗獲觀之其敷宣大法如雲雷迭興而九龍噴雨也如大醫王制藥隨證而愈疾也如摩醯三眼光明洞照而無不至也由是知禪師之道不實不虛不有不無不中不邊在普應之門蓋亦鏗然有聲者也以能以用窺禪師者抑亦末矣禪師既入寂兵燹方張所謂語録者皆為煨燼經今十有餘年矣一庵鄰上人自幼侍禪師與聞其道乃以舊本重刻不遠一千餘里來徵豫序豫謂禪師之道見於言讀其言自可知其道又何以序文為然稽之古德其語存于今者多名縉紳為題辭不若是固不足以表正宗之所寄第豫也非人惡足為禪師之重輕以禪師與余交也因不辭而為之書雖然禪師之道不落有無中邊虛實者固不可以語言文字求也欲求禪師之道其亦得魚兔而忘蹄筌者乎禪師行業豫嘗為撰塔上之銘茲不書上人方閲三藏諸經連年不自休今又孜孜而為是圖亦可謂不悖其師者也洪武九年秋八月二十五日翰林學士承旨嘉議大夫知制誥兼修國史兼太子贊善大夫金華宋濂謹序千巖和尚語録目録上堂小參普説法語頌古偈頌讚跋佛事附録
